services:
  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: always

  app:
    build: .
    container_name: hybrid-rag
    ports:
      - "8000:8080"
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant
    restart: always
    volumes:
      - ./data:/app/data

volumes:
  qdrant_storage: